<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background: classic Mac grey -->
  <rect width="1200" height="630" fill="#c0c0c0"/>

  <!-- Mac window -->
  <rect x="200" y="40" width="800" height="550" fill="#fff" stroke="#000" stroke-width="3" rx="0"/>

  <!-- Title bar -->
  <rect x="200" y="40" width="800" height="28" fill="#fff" stroke="#000" stroke-width="3"/>

  <!-- Close box -->
  <rect x="210" y="48" width="13" height="13" fill="#fff" stroke="#000" stroke-width="1.5"/>

  <!-- Title bar stripes (left) -->
  <g>
    <line x1="232" y1="48" x2="460" y2="48" stroke="#000" stroke-width="1"/>
    <line x1="232" y1="51" x2="460" y2="51" stroke="#000" stroke-width="1"/>
    <line x1="232" y1="54" x2="460" y2="54" stroke="#000" stroke-width="1"/>
    <line x1="232" y1="57" x2="460" y2="57" stroke="#000" stroke-width="1"/>
    <line x1="232" y1="60" x2="460" y2="60" stroke="#000" stroke-width="1"/>
  </g>

  <!-- Title text -->
  <text x="600" y="61" text-anchor="middle" font-family="'Chicago', 'Geneva', 'Courier New', monospace" font-size="16" font-weight="bold" fill="#000">2048</text>

  <!-- Title bar stripes (right) -->
  <g>
    <line x1="740" y1="48" x2="968" y2="48" stroke="#000" stroke-width="1"/>
    <line x1="740" y1="51" x2="968" y2="51" stroke="#000" stroke-width="1"/>
    <line x1="740" y1="54" x2="968" y2="54" stroke="#000" stroke-width="1"/>
    <line x1="740" y1="57" x2="968" y2="57" stroke="#000" stroke-width="1"/>
    <line x1="740" y1="60" x2="968" y2="60" stroke="#000" stroke-width="1"/>
  </g>

  <!-- Score boxes -->
  <rect x="240" y="84" width="120" height="44" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="300" y="100" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#000">SCORE</text>
  <text x="300" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#000">14820</text>

  <rect x="380" y="84" width="120" height="44" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="440" y="100" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#000">BEST</text>
  <text x="440" y="120" text-anchor="middle" font-family="'Courier New', monospace" font-size="20" font-weight="bold" fill="#000">14820</text>

  <!-- BLITZ checkbox -->
  <rect x="240" y="140" width="14" height="14" fill="#fff" stroke="#000" stroke-width="1.5"/>
  <text x="243" y="152" font-family="'Courier New', monospace" font-size="14" font-weight="bold" fill="#000">X</text>
  <text x="262" y="153" font-family="'Courier New', monospace" font-size="16" font-weight="bold" fill="#000">BLITZ</text>

  <!-- Timer buttons -->
  <rect x="340" y="138" width="36" height="20" rx="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="358" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#000">1s</text>

  <rect x="384" y="138" width="36" height="20" rx="4" fill="#000" stroke="#000" stroke-width="2"/>
  <text x="402" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#fff" font-weight="bold">2s</text>

  <rect x="428" y="138" width="36" height="20" rx="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="446" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#000">3s</text>

  <rect x="472" y="138" width="36" height="20" rx="4" fill="#fff" stroke="#000" stroke-width="2"/>
  <text x="490" y="152" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" fill="#000">5s</text>

  <!-- Blitz bar -->
  <rect x="240" y="168" width="720" height="10" fill="#fff" stroke="#000" stroke-width="1"/>
  <rect x="241" y="169" width="480" height="8" fill="#000"/>

  <!-- 4x4 Game Board -->
  <rect x="340" y="192" width="520" height="380" fill="#000" stroke="#000" stroke-width="3"/>

  <!-- Row 0 -->
  <rect x="346" y="198" width="122" height="86" fill="#505050"/>
  <text x="407" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#fff">128</text>

  <rect x="474" y="198" width="122" height="86" fill="#d0d0d0"/>
  <text x="535" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">8</text>

  <rect x="602" y="198" width="122" height="86" fill="#fff"/>
  <text x="663" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">4</text>

  <rect x="730" y="198" width="122" height="86" fill="#fff"/>
  <text x="791" y="252" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">2</text>

  <!-- Row 1 -->
  <rect x="346" y="290" width="122" height="86" fill="#383838"/>
  <text x="407" y="344" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#fff">256</text>

  <rect x="474" y="290" width="122" height="86" fill="#b0b0b0"/>
  <text x="535" y="344" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">16</text>

  <rect x="602" y="290" width="122" height="86" fill="#d0d0d0"/>
  <text x="663" y="344" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">8</text>

  <rect x="730" y="290" width="122" height="86" fill="#fff"/>
  <text x="791" y="344" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">4</text>

  <!-- Row 2 -->
  <rect x="346" y="382" width="122" height="86" fill="#202020"/>
  <text x="407" y="436" text-anchor="middle" font-family="'Courier New', monospace" font-size="36" font-weight="bold" fill="#fff">512</text>

  <rect x="474" y="382" width="122" height="86" fill="#909090"/>
  <text x="535" y="436" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#fff">32</text>

  <rect x="602" y="382" width="122" height="86" fill="#b0b0b0"/>
  <text x="663" y="436" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">16</text>

  <rect x="730" y="382" width="122" height="86" fill="#fff"/>
  <text x="791" y="436" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#000">2</text>

  <!-- Row 3 -->
  <rect x="346" y="474" width="122" height="86" fill="#101010" stroke="#aaa" stroke-width="1"/>
  <text x="407" y="528" text-anchor="middle" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#fff">1024</text>

  <rect x="474" y="474" width="122" height="86" fill="#707070"/>
  <text x="535" y="528" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#fff">64</text>

  <rect x="602" y="474" width="122" height="86" fill="#909090"/>
  <text x="663" y="528" text-anchor="middle" font-family="'Courier New', monospace" font-size="42" font-weight="bold" fill="#fff">32</text>

  <rect x="730" y="474" width="122" height="86" fill="#e8e8e8"/>
</svg>
