services:
  db:
    image: postgres:17
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    environment:
      POSTGRES_USER: blog
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: blog_prod
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U blog"]
      interval: 5s
      timeout: 5s
      retries: 5
    # Not exposed to host - only accessible from app containers

  app:
    build: .
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./cookies.txt:/app/cookies.txt:ro
    environment:
      DATABASE_URL: ecto://blog:${DB_PASSWORD}@db/blog_prod
      SECRET_KEY_BASE: ${SECRET_KEY_BASE}
      PHX_HOST: ${PHX_HOST:-bobbby.online}
      PORT: "4000"
      POOL_SIZE: "15"
      RECEIPT_PRINTER_API_TOKEN: ${RECEIPT_PRINTER_API_TOKEN:-}
      LIVE_DRAFT_TOKEN: ${LIVE_DRAFT_TOKEN:-}
      FINDER_ADMIN_PASSWORD: ${FINDER_ADMIN_PASSWORD:-}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY:-}
      S3_SECRET_KEY: ${S3_SECRET_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-bobbby-media}
    # Not exposed to host - Caddy proxies to port 4000 via Docker network

  nathan:
    build:
      context: /opt/nathan
    restart: always
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: ecto://blog:${DB_PASSWORD}@db/nathan_for_us_prod
      SECRET_KEY_BASE: ${NATHAN_SECRET_KEY_BASE}
      PHX_HOST: gifmaker.bobbby.online
      PORT: "4001"
      POOL_SIZE: "10"
      PHX_SERVER: "true"
      BLUESKY_USERNAME: ${BLUESKY_USERNAME:-}
      BLUESKY_APP_PASSWORD: ${BLUESKY_APP_PASSWORD:-}
      GOOGLE_ANALYTICS_ID: ${NATHAN_GOOGLE_ANALYTICS_ID:-}
    # Not exposed to host - Caddy proxies to port 4001 via Docker network

  # The LIVE Claude Arena — three daemons (watcher http :8901, commissioner,
  # league grinder) supervised by deploy/arena-supervisor.mjs in the soldat
  # repo, which is rsynced to /opt/soldat by its deploy/deploy-arena-live.sh.
  # The repo is BIND-MOUNTED at /app: node_modules + pnpm store live on the
  # host inside /opt/soldat (the supervisor pnpm-installs on boot), so a
  # redeploy is rsync + `docker compose restart soldat` — no image rebuild.
  # Caddy proxies bobbby.online/arena/* -> soldat:8901 (play/ stays static)
  # and /arena/ws -> soldat:8902 (the online-1v1 game server, a 4th
  # supervised daemon).
  soldat:
    build:
      context: /opt/soldat
      dockerfile: deploy/arena-live.Dockerfile
    restart: unless-stopped
    environment:
      ARENA_WATCH_BASE: /arena/play
      # Cap the shipped fight feeds: the full data.json crossed 300 MB and the
      # floor polls it every 5s — 40 matches the publish snapshot (~5 MB).
      ARENA_DATA_FIGHTS: "40"
      TZ: UTC
      PORT: "8901"
      GAME_SERVER_PORT: "8902"
    expose:
      - "8902"
    volumes:
      - /opt/soldat:/app
    # Not exposed to host - Caddy proxies to ports 8901/8902 via Docker network

  caddy:
    image: caddy:2
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
      - /opt/deciduous-site:/srv/deciduous:ro
      - /opt/phstats:/srv/phstats:ro
      - /opt/donny:/srv/donny:ro
      - /opt/blimp:/srv/blimp:ro
      - /opt/arena:/srv/arena:ro  # the Claude Arena snapshot (soldat repo, arena-live/publish.mjs)

volumes:
  pgdata:
  caddy_data:
  caddy_config:
